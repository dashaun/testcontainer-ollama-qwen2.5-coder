name: Update Ollama Image

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      ollama_version:
        description: 'Ollama version to force-build (e.g. 0.6.4). Leave empty for auto-detect.'
        required: false

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get latest ollama/ollama semver tag from Docker Hub
        id: ollama
        run: |
          VERSION=$(curl -s "https://hub.docker.com/v2/repositories/ollama/ollama/tags?ordering=last_updated&page_size=25" \
            | jq -r '.results[].name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Latest ollama version: ${VERSION}"

      - name: Get our latest published version from Docker Hub
        id: ours
        run: |
          BUILT=$(curl -s "https://hub.docker.com/v2/repositories/dashaun/testcontainer-ollama-qwen2.5-coder/tags?ordering=last_updated&page_size=25" \
            | jq -r '.results[].name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1 || echo "none")
          echo "built=${BUILT}" >> $GITHUB_OUTPUT
          echo "Our latest built version: ${BUILT}"

      - name: Check if build is needed
        id: check
        run: |
          FORCE="${{ github.event.inputs.ollama_version }}"
          LATEST="${{ steps.ollama.outputs.version }}"
          BUILT="${{ steps.ours.outputs.built }}"
          if [ -n "${FORCE}" ]; then
            echo "Force-building version: ${FORCE}"
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "target=${FORCE}" >> $GITHUB_OUTPUT
          elif [ "${LATEST}" != "${BUILT}" ]; then
            echo "New ollama version detected: ${LATEST} (we have: ${BUILT})"
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "target=${LATEST}" >> $GITHUB_OUTPUT
          else
            echo "Already up to date at ${BUILT}. Skipping."
            echo "needed=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-java@v4
        if: steps.check.outputs.needed == 'true'
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build jar
        if: steps.check.outputs.needed == 'true'
        run: mvn -q package -DskipTests

      - name: Log in to Docker Hub
        if: steps.check.outputs.needed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate and commit image
        if: steps.check.outputs.needed == 'true'
        run: |
          java -jar target/*.jar generate --ollamaVersion ${{ steps.check.outputs.target }}

      - name: Push versioned tag
        if: steps.check.outputs.needed == 'true'
        run: docker push dashaun/testcontainer-ollama-qwen2.5-coder:${{ steps.check.outputs.target }}

      - name: Push latest tag
        if: steps.check.outputs.needed == 'true'
        run: docker push dashaun/testcontainer-ollama-qwen2.5-coder:latest
